approval_policy = "never"
sandbox_mode = "danger-full-access"
model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"

[features]
multi_agent = true

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "__GITHUB_TOKEN__"

[mcp_servers.postgres_ro]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres"]

[mcp_servers.postgres_ro.env]
DATABASE_URL = "__POSTGRES_RO_DATABASE_URL__"

[plugins."github@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."vercel@openai-curated"]
enabled = true

