services:
  app:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.shared
    environment:
      CONFIG_ROOT: /app/repo
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${CONFIG_REPO:-/opt/myosotis/repo}:/app/repo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - myosotis

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.shared
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - myosotis

volumes:
  caddy_data:
  caddy_config:

networks:
  myosotis:
    driver: bridge
